site_name: RISC-V 64 Vector Linux Emulator
site_description: RV64GCV full-system emulator specifications and run evidence.
site_url: https://billzi2016.github.io/homemade-risc-v-64-vector-linux-emulator/
repo_url: https://github.com/billzi2016/homemade-risc-v-64-vector-linux-emulator
repo_name: billzi2016/homemade-risc-v-64-vector-linux-emulator
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: zh
          name: 简体中文
          default: true
          build: true
          site_name: RISC-V 64 Vector Linux Emulator
          nav_translations:
            Governance: 项目治理
            Architecture: 总体架构
            CPU and ISA: CPU 与 ISA
            Vector Engine: 向量引擎
            Memory System: 内存系统
            Devices: 外设
            System Integration: 系统集成
            Quality: 质量保证
            Docs Site: 文档站
            Home: 首页
          nav:
            - 首页: index.md
            - 项目概览:
                - project/README.zh.md
                - project/LINUX_BOOT_FLOW.zh.md
                - docs/RESULT.zh.md
                - docs/quickstart.zh.md
            - 项目治理:
                - project/AGENTS.zh.md
                - specs/README.zh.md
                - specs/constitution.zh.md
                - specs/standards-baseline.zh.md
                - specs/project-tree.zh.md
                - specs/tasks.zh.md
            - 总体架构:
                - specs/00-product-overview.zh.md
                - specs/01-architecture.zh.md
                - specs/19-implementation-roadmap.zh.md
            - CPU 与 ISA:
                - specs/02-cpu-privilege-csr.zh.md
                - specs/03-instruction-set.zh.md
                - specs/15-error-trap-handling.zh.md
            - 向量引擎:
                - specs/04-vector-extension-rvv.zh.md
            - 内存系统:
                - specs/05-memory-mmu-sv39.zh.md
                - specs/06-bus-mmio.zh.md
            - 外设设备:
                - specs/07-interrupt-clint-plic.zh.md
                - specs/08-uart-console.zh.md
                - specs/09-virtio-common.zh.md
                - specs/10-virtio-block.zh.md
                - specs/11-virtio-network.zh.md
            - 系统集成:
                - specs/12-boot-firmware-linux.zh.md
                - specs/13-cli-runtime.zh.md
                - specs/14-host-network-setup.zh.md
                - docs/linux-runbook.zh.md
            - 质量保证与测试:
                - specs/16-testing-verification.zh.md
                - specs/17-coding-standards.zh.md
                - specs/18-dependency-artifact-policy.zh.md
                - docs/third-party.zh.md
                - tests/act4/README.zh.md
            - 文档站点:
                - docs-site/mkdocs_prd.zh.md
                - docs-site/github_action_prd.zh.md
        - locale: en
          name: English
          build: true
          site_name: RISC-V 64 Vector Linux Emulator
          nav:
            - Home: index.md
            - Overview:
                - project/README.md
                - project/LINUX_BOOT_FLOW.md
                - docs/RESULT.md
                - docs/quickstart.md
            - Governance:
                - project/AGENTS.md
                - specs/README.md
                - specs/constitution.md
                - specs/standards-baseline.md
